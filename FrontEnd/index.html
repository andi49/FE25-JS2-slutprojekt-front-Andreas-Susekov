<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-project</title>
  </head>
  <body>
    <header>
      <section class="twoBoxses">
        <div class="memberadd">
          <h1>Add new member to the team</h1>
          <form id="memberForm">
            <input type="text" placeholder="name" name="name" required />

            <select name="category" required>
              <option value="">Choose category</option>
              <option value="BACKEND">BACKEND</option>
              <option value="FRONTEND">FRONTEND</option>
              <option value="BUG-TESTER">BUG-TESTER</option>
              <option value="UX-DESIGNER">UX-DESIGNER</option>
            </select>

            <button type="submit">Send</button>
          </form>
        </div>
        <h1 id="test"></h1>
        <div class="assignmentadd">
          <h2>Add a new task to the board</h2>
          <input type="text" placeholder="title" required />
          <textarea name="" id=""></textarea>
          <select name="" id="">
            <option value="">BACKEND</option>
            <option value="">FRONTEND</option>
            <option value="">BUG-TESTER</option>
            <option value="">UX-DESIGNER</option>
          </select>
        </div>
      </section>
    </header>
    <section>
      <select name="" id="getAllMembers"></select>
    </section>
  </body>
  <script type="module" src="/src/main.ts"></script>
</html>
