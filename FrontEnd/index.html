<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./src/style.css" />
     <link rel="shortcut icon" href="src/img/favicon-32x32.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrum board</title>
  </head>
  <body>
    <header>

      <section class="twoBoxses">
        <div class="memberadd">

          <h2>Add a new member to the team</h2>
          <form id="memberForm">
            <input type="text" placeholder="name" name="name"  id="nameInput" required/>

            <select name="category" id="categorySelect" required>
              <option value="">Choose category</option>
             <option value="FRONTEND">FRONTEND</option>
              <option value="BACKEND">BACKEND</option>
              <option value="BUG-TESTER">BUG-TESTER</option>
              <option value="UX-DESIGNER">UX-DESIGNER</option>
            </select>
            <button type="submit">Send</button>
          </form>
        </div>

        <div class="assignmentadd">
          <h2>Add a new task to the board</h2>

          <form id="assignmentForm">

          <input type="text" placeholder="title" name="title" required />
          <textarea name="description"></textarea>

          <select name="category" id="categoryTwoSelect" required>
             <option value="">Choose category</option>
             <option value="FRONTEND">FRONTEND</option>
              <option value="BACKEND">BACKEND</option>
              <option value="BUG-TESTER">BUG-TESTER</option>
              <option value="UX-DESIGNER">UX-DESIGNER</option>
          </select>
          
           <button type="submit">Send</button>
          </form>
        </div>
      </section>
    </header>

     <section class="board">

      <!-- Todo -->
       <div class="box">
        <h2 class="">Task</h2>
      <div class="div-todo" id="board-todo">
        <div id="boardTodo"></div>
      </div>
      </div>

      <!-- In Progress -->
       <div class="box">
        <h2>Task in Progress</h2>
      <div class="div-in-progress" id="board-in-progress"></div>
     </div>

      <!-- Done -->
       <div class="box">
          <h2>Task Done</h2>
      <div class="div-done" id="board-is-done">

      </div>
      </div>

    </section>

  </body>
  <script type="module" src="/src/main.ts"></script>
</html>
